    <!--
        Inline script para prevenir FOUC (Flash of Unstyled Content) en dark mode.
        scripts.js es un ES module y se ejecuta deferred (después del primer paint).
        Si dejáramos la lógica del tema ahí, los usuarios con dark mode preferido
        verían un flash blanco antes de que el JS aplique data-theme="dark".
        Este script corre sincronicamente antes del CSS, evitando ese flash.
        Patrón estándar: Next.js, Vercel, GitHub, Twitter usan la misma técnica.
    -->
    <script>
        (function () {
            // try/catch: localStorage puede tirar SecurityError en Firefox con
            // cookies bloqueadas o en iframes con sandbox restrictivo. En esos
            // casos caemos al default light sin romper la app.
            try {
                const stored = localStorage.getItem('theme');
                const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                const theme = stored || (prefersDark ? 'dark' : 'light');
                if (theme === 'dark') {
                    document.documentElement.setAttribute('data-theme', 'dark');
                    // Pre-sincronizar theme-color para evitar el flash en la barra
                    // de URL del navegador mobile durante el primer paint.
                    // IMPORTANTE: este valor debe matchear --primary-color del
                    // bloque [data-theme="dark"] en styles.css. Si cambia ahí,
                    // actualizar acá también. (Una vez que scripts.js carga,
                    // applyTheme() lo re-lee desde getComputedStyle.)
                    const meta = document.querySelector('meta[name="theme-color"]');
                    if (meta) meta.content = '#60a5fa';
                }
            } catch (e) { /* localStorage bloqueado: caemos al default light. */ }
        })();
    </script>
</head>
