<!DOCTYPE html>
<html lang="es-AR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' https://*.thecatapi.com https://pixabay.com https://cdn.pixabay.com data:; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' https://api.thecatapi.com https://pixabay.com">

    <title>TP1 - TyGW</title>
    <meta name="description" content="Galería de imágenes que consume APIs públicas (The Cat API y Pixabay). SPA construida con HTML, CSS y JavaScript vanilla.">
    <meta name="author" content="Nicolás Yorlano">
    <meta name="theme-color" content="#2563eb">
    <link rel="canonical" href="https://catsandcars-js.vercel.app/">
    <!-- Paths absolutos (empiezan con /) en lugar de relativos. Razón: con
         routing SPA via History API, el browser puede estar parado en cualquier
         ruta nested (/cars/pepe, /cats/x/y, etc). Un href relativo como
         "styles.css" se resuelve contra esa ruta → /cars/pepe/styles.css →
         404 del server (o el index.html falseado por el SPA fallback, que
         rompe el MIME type del módulo JS). Absoluto = siempre desde root. -->
    <link rel="stylesheet" href="/styles.css">
    <link rel="icon" type="image/png" href="/public/favicon.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/public/apple-touch-icon.png">

    <!-- Open Graph: tarjeta cuando alguien comparte el link en redes/chats.
         Imagen 1200×630 con wordmark + descripción; URL absoluta porque
         WhatsApp/Slack/Twitter resuelven og:image desde su CDN, no relativo. -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://catsandcars-js.vercel.app/">
    <meta property="og:title" content="TP1 — TyGW · Cats &amp; Cars">
    <meta property="og:description" content="Galería SPA que consume The Cat API y Pixabay. Vanilla JS con router History API, cache versionado y modal accesible.">
    <meta property="og:image" content="https://catsandcars-js.vercel.app/public/og-image.png">
    <meta property="og:locale" content="es_AR">
    <meta name="twitter:card" content="summary_large_image">

    <!--
        Inline script anti-FOUC en dark mode: scripts.js es ES module (deferred) y no
        puede aplicar el theme antes del primer paint. Este script sí, porque corre
        sincronicamente antes del CSS. Patrón usado por Next.js, Vercel, GitHub.
    -->
    <script>
        (function () {
            // localStorage puede tirar (Firefox con cookies bloqueadas / iframes sandbox).
            // Si falla, caemos al default light sin romper la app.
            try {
                const stored = localStorage.getItem('theme');
                const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                const theme = stored || (prefersDark ? 'dark' : 'light');
                if (theme === 'dark') {
                    document.documentElement.setAttribute('data-theme', 'dark');
                    // Pre-sync theme-color para evitar flash en la URL bar de mobile.
                    // Debe matchear --primary-color del bloque [data-theme="dark"] en styles.css.
                    // applyTheme() lo refina cuando scripts.js carga.
                    const meta = document.querySelector('meta[name="theme-color"]');
                    if (meta) meta.content = '#60a5fa';
                }
            } catch (e) { /* localStorage bloqueado: caemos al default light. */ }
        })();
    </script>
</head>

<body>
    <noscript>
        <style>
            body > :not(.noscript-message) { display: none !important; }
            .noscript-message {
                max-width: 32rem;
                margin: 4rem auto;
                padding: 1.5rem 2rem;
                font-family: system-ui, sans-serif;
                border: 1px solid #e2e8f0;
                border-radius: 8px;
                background: #f8fafc;
                color: #1e293b;
                line-height: 1.6;
                text-align: center;
            }
        </style>
        <div class="noscript-message">
            <h1 style="font-size: 1.2rem; margin-bottom: 0.5rem;">JavaScript requerido</h1>
            <p>Esta aplicación es una SPA (Single Page Application) y necesita JavaScript habilitado para funcionar. Activalo en la configuración de tu navegador y recargá la página.</p>
        </div>
    </noscript>

    <header>
        <div>
            <a href="/" class="brand-link" aria-label="Ir a inicio">
                <span>TyGW.LAB</span>
            </a>
        </div>

        <div class="header-title-group">
            <p class="header-title">Trabajo Práctico N° 1</p>
            <p>Nicolás Yorlano</p>
        </div>

        <div class="header-actions">
            <button type="button" id="theme-toggle" class="theme-toggle" aria-label="Cambiar tema" title="Cambiar tema" aria-pressed="false">
                <svg class="theme-toggle-icon icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
                <svg class="theme-toggle-icon icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
            </button>
        </div>
    </header>

    <nav class="sidebar" aria-label="Navegación principal">
        <h2 class="sidebar-heading">Exploración de Datos</h2>
        <a href="/" data-route="home">Inicio</a>
        <h3 class="sidebar-section-label">APIs Públicas</h3>
        <a href="/cats" data-route="cats">Gatitos tiernos</a>
        <a href="/cars" data-route="cars">Autos que no nos alcanza para tener</a>
    </nav>

    <main>
        <div id="main">
            <!-- Se inyecta por JS -->
        </div>
    </main>

    <footer>
        <p>
            Tecnología y Gestión Web — Nicolás Yorlano &copy; <span data-year></span>
        </p>
    </footer>

    <script type="module" src="/scripts.js"></script>

</body>
</html>
