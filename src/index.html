<!DOCTYPE html>
<html lang="es-AR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' https: data:; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' https://api.thecatapi.com https://pixabay.com">

    <title>TP1 - TyGW</title>
    <meta name="description" content="Galería de imágenes que consume APIs públicas (The Cat API y Pixabay). SPA construida con HTML, CSS y JavaScript vanilla.">
    <meta name="author" content="Nicolás Yorlano">
    <meta name="theme-color" content="#2563eb">
    <link rel="canonical" href="https://catsandcars-js.vercel.app/">
    <!-- Paths absolutos para que deep links (F5 en /cars, /cats/x, etc) carguen
         los assets desde root del deploy, no relativo a la ruta actual del browser.
         Es el patrón estándar de SPA (Vite, Next, Vue CLI lo generan así). -->
    <link rel="stylesheet" href="/styles.css">
    <link rel="icon" type="image/png" href="/assets/favicon.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/apple-touch-icon.png">

    <!-- Open Graph: estándar de facto para link previews en redes y chats
         (WhatsApp, Discord, Slack, LinkedIn, iMessage, Telegram, Signal,
         Facebook, Twitter/X via fallback, etc.). Imagen 2400×1260 @2x retina
         (ratio 1.91:1, recomendado de OG); URL absoluta porque los crawlers
         resuelven og:image desde su propio CDN, no desde el browser del usuario.
         width/height DEBEN matchear las dimensiones reales del archivo — si
         no, plataformas como LinkedIn degradan el card a formato chico. -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://catsandcars-js.vercel.app/">
    <meta property="og:title" content="Cats &amp; Cars — Galería SPA en vanilla JS · TP1 TyGW">
    <meta property="og:description" content="Galería SPA que consume The Cat API y Pixabay. Vanilla JS con router History API, cache versionado y modal accesible.">
    <meta property="og:image" content="https://catsandcars-js.vercel.app/assets/og-image.png">
    <meta property="og:image:width" content="2400">
    <meta property="og:image:height" content="1260">
    <meta property="og:image:alt" content="Cats & Cars — galería SPA en vanilla JavaScript que combina The Cat API y Pixabay">
    <meta property="og:locale" content="es_AR">

    <!-- Twitter Cards: Twitter cae a og:* solo para algunos campos. Para
         twitter:description cae al <meta name="description"> (HTML general,
         pensado para Google) que es distinto del og:description. Declaramos
         twitter:* explícitos mapeando los valores OG para que Twitter muestre
         lo mismo que LinkedIn/WhatsApp/etc., no el meta description SEO. -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Cats &amp; Cars — Galería SPA en vanilla JS · TP1 TyGW">
    <meta name="twitter:description" content="Galería SPA que consume The Cat API y Pixabay. Vanilla JS con router History API, cache versionado y modal accesible.">
    <meta name="twitter:image" content="https://catsandcars-js.vercel.app/assets/og-image.png">
    <meta name="twitter:image:alt" content="Cats & Cars — galería SPA en vanilla JavaScript que combina The Cat API y Pixabay">

    <!--
        Inline script anti-FOUC en dark mode: scripts.js es ES module (deferred) y no
        puede aplicar el theme antes del primer paint. Este script sí, porque corre
        sincronicamente antes del CSS. Patrón usado por Next.js, Vercel, GitHub.
    -->
    <script>
        (function () {
            // localStorage puede tirar (Firefox con cookies bloqueadas / iframes sandbox).
            // Si falla, caemos al default light sin romper la app.
            try {
                const stored = localStorage.getItem('theme');
                const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                const theme = stored || (prefersDark ? 'dark' : 'light');
                if (theme === 'dark') {
                    document.documentElement.setAttribute('data-theme', 'dark');
                    // Pre-sync theme-color para evitar flash en la URL bar de mobile.
                    // Debe matchear --primary-color del bloque [data-theme="dark"] en styles.css.
                    // applyTheme() lo refina cuando scripts.js carga.
                    const meta = document.querySelector('meta[name="theme-color"]');
                    if (meta) meta.content = '#60a5fa';
                }
            } catch (e) { /* localStorage bloqueado: caemos al default light. */ }
        })();
    </script>
</head>

<body>
    <noscript>
        <style>
            /* Oculta TODO menos el propio <noscript>. El selector anterior
               (`body > :not(.noscript-message)`) también matcheaba al
               <noscript> porque .noscript-message vive ADENTRO del <noscript>,
               no como child directo de body. Resultado: <noscript> se ocultaba
               y por herencia su contenido también → pantalla en blanco. */
            body > *:not(noscript) { display: none !important; }
            /* Reset del grid del layout principal — con grid activo, el
               margin:auto del message no lo centra (el grid lo confina a su
               cell). display:block restaura flow normal para que el margin
               horizontal automático lo centre como dicta el design. */
            body { display: block !important; }
            .noscript-message {
                max-width: 32rem;
                margin: 2rem auto;
                margin-inline: 1rem;
                padding: 1.5rem 2rem;
                font-family: system-ui, sans-serif;
                border: 1px solid #e2e8f0;
                border-radius: 8px;
                background: #f8fafc;
                color: #1e293b;
                line-height: 1.6;
                text-align: center;
            }
        </style>
        <div class="noscript-message">
            <h1 style="font-size: 1.2rem; margin-bottom: 0.5rem;">JavaScript requerido</h1>
            <p>Esta aplicación es una SPA (Single Page Application) y necesita JavaScript habilitado para funcionar. Activalo en la configuración de tu navegador y recargá la página.</p>
        </div>
    </noscript>

    <header>
        <div>
            <a href="/" class="brand-link" aria-label="Ir a inicio">
                <span>TyGW.LAB</span>
            </a>
        </div>

        <div class="header-title-group">
            <p class="header-title">Trabajo Práctico N° 1</p>
            <p>Nicolás Yorlano</p>
        </div>

        <div class="header-actions">
            <button type="button" id="theme-toggle" class="theme-toggle" aria-label="Cambiar tema" title="Cambiar tema" aria-pressed="false">
                <svg class="theme-toggle-icon icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
                <svg class="theme-toggle-icon icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
            </button>
        </div>
    </header>

    <nav class="sidebar" aria-label="Navegación principal">
        <a href="/" data-route="home">Inicio</a>
        <h3 class="sidebar-section-label">Galerías</h3>
        <a href="/cats" data-route="cats">Gatos tiernos</a>
        <a href="/cars" data-route="cars">Autos que queremos tener</a>
    </nav>

    <main>
        <div id="main">
            <!-- Se inyecta por JS -->
        </div>
    </main>

    <footer>
        <p>
            Tecnología y Gestión Web — Nicolás Yorlano &copy; <span data-year></span>
        </p>
    </footer>

    <div id="sr-announce" class="sr-only" aria-live="polite" aria-atomic="true"></div>

    <script type="module" src="/main.js"></script>

</body>
</html>
