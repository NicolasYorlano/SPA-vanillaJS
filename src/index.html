    <link rel="apple-touch-icon" sizes="180x180" href="/assets/apple-touch-icon.png">

    <!-- og:image 1440×804 (ratio 1.79:1). URL absoluta porque los
         crawlers la resuelven desde su CDN, no desde el browser del usuario.
         width/height DEBEN matchear el archivo real — LinkedIn degrada el card
         a formato chico si no coinciden. -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://catsandcars-js.vercel.app/">
    <meta property="og:title" content="Cats &amp; Cars — Galería SPA en vanilla JS · TP1 TyGW">
    <meta property="og:description" content="Galería SPA que consume The Cat API y Pixabay. Vanilla JS con router History API, cache versionado y modal accesible.">
    <meta property="og:image" content="https://catsandcars-js.vercel.app/assets/og-image.png">
    <meta property="og:image:width" content="1440">
    <meta property="og:image:height" content="804">
    <meta property="og:image:alt" content="Cats & Cars — galería SPA en vanilla JavaScript que combina The Cat API y Pixabay">
    <meta property="og:locale" content="es_AR">

    <!-- Twitter cae a <meta name="description"> (SEO) para twitter:description,
         no a og:description. Declaramos twitter:* explícitos para que muestre
         lo mismo que LinkedIn/WhatsApp/etc., no el meta description. -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Cats &amp; Cars — Galería SPA en vanilla JS · TP1 TyGW">
    <meta name="twitter:description" content="Galería SPA que consume The Cat API y Pixabay. Vanilla JS con router History API, cache versionado y modal accesible.">
    <meta name="twitter:image" content="https://catsandcars-js.vercel.app/assets/og-image.png">
    <meta name="twitter:image:alt" content="Cats & Cars — galería SPA en vanilla JavaScript que combina The Cat API y Pixabay">

    <!-- Anti-FOUC: aplica el theme antes del primer paint. main.js es ES module
         (deferred) → corre tarde. Este inline corre sincrónicamente antes del CSS. -->
    <script>
        (function () {
            // localStorage puede tirar error (Firefox con cookies bloqueadas / iframes sandbox).
            // Si falla, caemos al default light sin romper la app.
            try {
                const stored = localStorage.getItem('theme');
                const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                const theme = stored || (prefersDark ? 'dark' : 'light');
                if (theme === 'dark') {
                    document.documentElement.setAttribute('data-theme', 'dark');
                    // Pre-sync theme-color para evitar flash en la URL bar de mobile.
                    // IMPORTANTE: Debe coincidir con var(--primary-color) del bloque [data-theme="dark"] en styles.css.
                    // applyTheme() lo refina cuando main.js carga.
                    const meta = document.querySelector('meta[name="theme-color"]');
                    if (meta) meta.content = '#60a5fa';
                }
            } catch (e) { /* localStorage bloqueado: caemos al default light. */ }
        })();
    </script>
</head>

               del body, aislando el contexto de este <noscript>. */ 
            body > *:not(noscript) { display: none !important; }

               el flujo normal y permitir el centrado del mensaje. */
            body { display: block !important; }

    </noscript>
